<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-header">
      <h2>Admin Panel</h2>
      <button id="closeSidebarBtn">✖</button>
    </div>

    <div class="admin-profile-mini">
      <img id="adminAvatar" src="/images/default-profile.png" />
      <h3 id="adminName">Name</h3>
      <p id="adminRole">role</p>
      <p id="adminDepartment">department</p>
      <p id="adminSection">section</p>
      <p id="adminYear">year</p>

      <!-- Hidden file input -->
      <input type="file" id="profileInput" style="display: none" />
    </div>

    <nav class="admin-menu">
      <button class="menu-item active" id="openCreateCourseBtn">
        📘 Create Course
      </button>
      <button class="menu-item" id="openMaterialBtn">
        📂 Upload Materials
      </button>
      <button class="menu-item" id="openAssignmentBtn">
        📝 Upload Assignment
      </button>
      <button class="menu-item" id="openScheduleClassBtn">
        🗓️ Schedule Class
      </button>
      <button class="menu-item" id="openAdminCoursesBtn">
        📚 Department Courses
      </button>
    </nav>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <button id="openSidebarBtn" class="mobile-menu-btn">☰</button>
    <div id="adminContent"></div>
  </main>
</div>
