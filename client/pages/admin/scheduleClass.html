<section class="schedule-container">
  <div class="schedule-card">
    <h2>Schedule Class</h2>

    <p class="hint">
      Set up class date, time, and room or online link for your students.
    </p>

    <select id="scheduleCourse">
      <option value="">Select Course</option>
    </select>

    <div class="form-group">
      <label for="classDate">📅 Class Date:</label>
      <input type="date" id="classDate" class="date-input" required />
      <small class="field-hint">Select the date for this class</small>
    </div>

    <div class="form-group">
      <label for="classTime">⏰ Class Time:</label>
      <input type="time" id="classTime" class="time-input" required />
      <small class="field-hint">24-hour format (e.g., 09:00, 14:30)</small>
    </div>

    <input
      type="text"
      id="classLocation"
      placeholder="Room number or Online meeting link"
    />

    <!-- NEW: Department field (auto-filled from admin's department) -->
    <input
      type="text"
      id="department"
      readonly
      placeholder="Department (auto-filled)"
      style="background-color: #f0f0f0; cursor: not-allowed"
    />

    <select id="section">
      <option value="">Select Section</option>
      <option value="1">Section 1</option>
      <option value="2">Section 2</option>
      <option value="3">Section 3</option>
      <option value="4">Section 4</option>
      <option value="5">Section 5</option>
      <option value="6">Section 6</option>
      <option value="7">Section 7</option>
      <option value="8">Section 8</option>
      <option value="9">Section 9</option>
      <option value="10">Section 10</option>
    </select>

    <!-- NEW: Year field -->
    <select id="year" required>
      <option value="">Select Year</option>
      <option value="2024">2024</option>
      <option value="2025">2025</option>
      <option value="2026">2026</option>
      <option value="2027">2027</option>
    </select>

    <button id="scheduleClassBtn">Schedule Class</button>
  </div>
</section>
