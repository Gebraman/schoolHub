<section class="contact-section">
  <h2>Contact Us</h2>

  <p>
    We value your feedback and inquiries. Whether you have academic questions,
    technical issues, or general suggestions, our team is ready to assist you.
    Please fill out the form below and we will respond as soon as possible.
  </p>

  <form id="contactForm">
    <input type="text" id="name" placeholder="Your Name" required />
    <input type="email" id="email" placeholder="Your Email" required />
    <textarea id="message" placeholder="Your Message" required></textarea>
    <button type="submit">Send Message</button>
  </form>

  <p id="contactStatus"></p>
</section>
